document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --font-display: 'Urbanist', 'Helvetica Neue', Arial, sans-serif;\n  --font-body: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;\n}\n\n:root {\n  /* ---- Primary ---- */\n  --black: #020202;\n  --white: #FFFFFF;\n\n  /* ---- Secondary (neutrals) ---- */\n  --soft-charcoal: #0A0A0A;\n  --graphite: #1E1E22;\n  --light-grey: #B8B8BD;\n  --mist: #E4DFF0;\n\n  /* ---- Accents (context-dependent on background) ---- */\n  --lavender-glow: #F4EEFF;\n  --pastel-green: #A8FFB8;\n  --deep-green: #2E7D4F;\n  --luminous-lavender: #D7C3FF;\n  --deep-violet: #7C5CC7;\n\n  /* ---- Semantic aliases ---- */\n  --surface-primary: var(--black);\n  --surface-secondary: var(--soft-charcoal);\n  --surface-elevated: var(--graphite);\n  --surface-inverse: var(--white);\n\n  --text-on-dark-primary: var(--white);\n  --text-on-dark-secondary: var(--light-grey);\n  --text-on-light-primary: var(--black);\n  --text-on-light-secondary: var(--graphite);\n\n  --border-subtle-dark: #2A2A2E;\n  --border-subtle-light: var(--mist);\n\n  --accent-primary: var(--deep-violet);\n  --accent-primary-hover: var(--luminous-lavender);\n  --accent-on-dark: var(--luminous-lavender);\n  --accent-on-light: var(--deep-violet);\n  --accent-success: var(--deep-green);\n  --accent-success-surface: var(--pastel-green);\n  --accent-soft-surface: var(--lavender-glow);\n\n  --focus-ring: var(--luminous-lavender);\n}\n\n:root {\n  /* ---- Type scale ---- */\n  --text-display-xl: 72px;\n  --text-display-l: 56px;\n  --text-display-m: 40px;\n  --text-display-s: 30px;\n  --text-heading: 24px;\n  --text-body-l: 19px;\n  --text-body: 16px;\n  --text-body-s: 14px;\n  --text-caption: 12px;\n\n  --leading-tight: 1.05;\n  --leading-snug: 1.2;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0em;\n  --tracking-wide: 0.06em;\n\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-extrabold: 800;\n}\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  --radius-s: 6px;\n  --radius-m: 12px;\n  --radius-l: 20px;\n  --radius-pill: 999px;\n\n  --shadow-soft: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);\n  --shadow-glow-violet: 0 0 32px rgba(124,92,199,0.35);\n  --shadow-glow-green: 0 0 32px rgba(168,255,184,0.25);\n\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-normal: 200ms; /* @kind other */\n  --duration-slow: 400ms; /* @kind other */\n}\n\n<\u002Fstyle>\n  <script src=\"2ff53210-963b-4d70-8a37-fd082a73fc90\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    body { margin: 0; background: var(--black); }\n    a { color: var(--luminous-lavender); }\n    a:hover { color: var(--lavender-glow); }\n    ::selection { background: var(--deep-violet); color: #fff; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: var(--font-body); background: var(--black); color: var(--white); min-height: 100vh;\">\n\n  <!-- NAV (appears on scroll) -->\n  <div style=\"{{ navBarStyle }}\">\n    <div style=\"display: flex; align-items: center; gap: 44px;\">\n      <img src=\"e500addd-71bc-481b-961e-3b05e3cd2744\" alt=\"dot.arc\" style=\"height: 20px; display: block;\">\n      <div style=\"display: flex; align-items: center; gap: 28px;\">\n        <a href=\"#why\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s); font-weight: 500;\" style-hover=\"color: var(--white);\">Why dot.arc<\u002Fa>\n        <a href=\"#structure\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s); font-weight: 500;\" style-hover=\"color: var(--white);\">Structure<\u002Fa>\n        <a href=\"#agenda\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s); font-weight: 500;\" style-hover=\"color: var(--white);\">Agenda<\u002Fa>\n        <a href=\"#editions\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s); font-weight: 500;\" style-hover=\"color: var(--white);\">Editions<\u002Fa>\n        <a href=\"#attend\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s); font-weight: 500;\" style-hover=\"color: var(--white);\">Who attends<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; align-items: center; gap: 16px;\">\n      <div style=\"display: flex; background: var(--graphite); border: 1px solid var(--border-subtle-dark); border-radius: 999px; padding: 3px;\">\n        <sc-for list=\"{{ eventList }}\" as=\"ev\" hint-placeholder-count=\"2\">\n          <button sc-camel-on-click=\"{{ ev.select }}\" style=\"{{ ev.pillStyle }}\">{{ ev.shortLabel }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ openRegister }}\" style=\"display: inline-flex; align-items: center; justify-content: center; padding: 9px 20px; border-radius: 999px; background: var(--deep-violet); color: var(--white); border: none; font-family: var(--font-display); font-weight: 600; font-size: var(--text-body-s); cursor: pointer;\">Register interest<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <div style=\"position: relative; padding: 96px 48px 120px; overflow: hidden; display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 1px solid var(--border-subtle-dark);\">\n    \n    \n    <img src=\"e500addd-71bc-481b-961e-3b05e3cd2744\" alt=\"dot.arc\" style=\"position: relative; height: 125px; margin-bottom: 8px; width: 327px\"><svg width=\"100%\" height=\"170\" sc-camel-view-box=\"0 0 1200 170\" sc-camel-preserve-aspect-ratio=\"none\" style=\"position: relative; max-width: 1200px; display: block; margin-bottom: 56px; overflow: visible; top: 45px; margin-top: -20px; width: 735px; height: 175px\">\n      <defs>\n        <linearGradient id=\"arcFade\" x1=\"0\" y1=\"0\" x2=\"1200\" y2=\"0\" sc-camel-gradient-units=\"userSpaceOnUse\">\n          <stop offset=\"0%\" stop-color=\"var(--luminous-lavender)\" stop-opacity=\"0\"><\u002Fstop>\n          <stop offset=\"50%\" stop-color=\"var(--luminous-lavender)\" stop-opacity=\"0.9\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"var(--luminous-lavender)\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <filter id=\"arcBlurSoft\" x=\"-10%\" y=\"-60%\" width=\"120%\" height=\"220%\">\n          <feGaussianBlur sc-camel-std-deviation=\"5\"><\u002FfeGaussianBlur>\n        <\u002Ffilter>\n      <\u002Fdefs>\n      <path d=\"M 0 150 A 1400 1400 0 0 1 1200 150\" fill=\"none\" stroke=\"url(#arcFade)\" stroke-width=\"6\" filter=\"url(#arcBlurSoft)\"><\u002Fpath>\n      <path d=\"M 0 150 A 1400 1400 0 0 1 1200 150\" fill=\"none\" stroke=\"url(#arcFade)\" stroke-width=\"1.5\"><\u002Fpath>\n    <\u002Fsvg><h1 style=\"position: relative; font-family: var(--font-display); font-weight: 800; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); font-size: 68px; margin: 0 0 28px; max-width: 920px;\">Where nothing becomes something, out in the open.<\u002Fh1>\n    <p style=\"position: relative; font-size: var(--text-body-l); line-height: var(--leading-relaxed); color: var(--light-grey); max-width: 680px; margin: 0 0 48px;\">Where AI amplifies skill instead of replacing it, tested in public, not promised in a deck.<\u002Fp>\n    <div style=\"position: relative; display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap;\">\n      <button sc-camel-on-click=\"{{ openRegister }}\" style=\"display: inline-flex; align-items: center; justify-content: center; padding: 15px 30px; border-radius: 999px; background: var(--white); color: var(--black); border: none; font-family: var(--font-display); font-weight: 600; font-size: var(--text-body); cursor: pointer;\">Register Now<\u002Fbutton>\n      <a href=\"#agenda\"><x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Button\" variant=\"secondary\" size=\"l\" hint-size=\"auto,54px\">View agenda<\u002Fx-import><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHY THIS EVENT — editorial split, no cards -->\n  <div id=\"why\" style=\"padding: 120px 48px; scroll-margin-top: 90px; border-bottom: 1px solid var(--border-subtle-dark);\">\n    <div style=\"max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start;\">\n      <div>\n        <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 20px;\">Why this event<\u002Fdiv>\n        <h2 style=\"font-family: var(--font-display); font-size: 44px; font-weight: 800; letter-spacing: var(--tracking-tight); line-height: 1.15; margin: 0;\">dot.arc doesn't sell a vision of the future. It shows up where the work is actually happening.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"padding-top: 8px;\">\n        <p style=\"color: var(--light-grey); font-size: var(--text-body-l); line-height: var(--leading-relaxed); margin: 0 0 24px;\">That's the whole reason this event exists. A brand can publish frameworks and advisory language all it wants, but trust is built where people can see the work, not where it's promised.<\u002Fp>\n        <p style=\"color: var(--light-grey); font-size: var(--text-body-l); line-height: var(--leading-relaxed); margin: 0 0 48px;\">So twice a year, dot.arc brings both sides of the AI adoption question into the same room.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column;\">\n          <div style=\"display: flex; gap: 24px; padding: 24px 0; border-top: 1px solid var(--border-subtle-dark);\">\n            <div style=\"font-family: var(--font-display); font-weight: 800; font-size: var(--text-display-s); color: var(--luminous-lavender); flex-shrink: 0; width: 60px;\">01<\u002Fdiv>\n            <div>\n              <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-heading); margin-bottom: 6px;\">The professionals<\u002Fdiv>\n              <div style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed);\">Actually doing the work, watching to see if this is real.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 24px; padding: 24px 0; border-top: 1px solid var(--border-subtle-dark); border-bottom: 1px solid var(--border-subtle-dark);\">\n            <div style=\"font-family: var(--font-display); font-weight: 800; font-size: var(--text-display-s); color: var(--luminous-lavender); flex-shrink: 0; width: 60px;\">02<\u002Fdiv>\n            <div>\n              <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-heading); margin-bottom: 6px;\">The leaders<\u002Fdiv>\n              <div style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed);\">Deciding how AI enters their organization, looking for proof, not theory.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"color: var(--light-grey); font-size: var(--text-body-s); line-height: var(--leading-relaxed); margin: 24px 0 0;\">Two regions, same belief, same structure, different industries in the spotlight depending on where you are.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- EVENT STRUCTURE -->\n  <div id=\"structure\" style=\"padding: 120px 48px; scroll-margin-top: 90px; border-bottom: 1px solid var(--border-subtle-dark);\">\n    <div style=\"max-width: 1280px; margin: 0 auto;\">\n      <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 14px;\">Event structure<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-display); font-size: 44px; font-weight: 800; letter-spacing: var(--tracking-tight); margin: 0 0 24px; max-width: 780px;\">Three full days. Three concurrent spaces, plus a floor that never closes.<\u002Fh2>\n      <p style=\"color: var(--light-grey); font-size: var(--text-body-l); line-height: var(--leading-relaxed); max-width: 720px; margin: 0 0 56px;\">Days one and two run three concurrent spaces on top of a continuously open exhibition floor.<\u002Fp>\n      <div style=\"display: flex; flex-direction: column;\">\n        <sc-for list=\"{{ eventStructure }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"display: grid; grid-template-columns: 40px 220px 1fr; gap: 24px; padding: 26px 0; border-top: 1px solid var(--border-subtle-dark);\">\n            <div style=\"font-family: var(--font-display); font-weight: 700; color: var(--graphite); font-size: var(--text-body-l);\">{{ item.num }}<\u002Fdiv>\n            <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-body-l);\">{{ item.name }}<\u002Fdiv>\n            <div style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed);\">{{ item.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"border-top: 1px solid var(--border-subtle-dark);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- AGENDA -->\n  <div id=\"agenda\" style=\"padding: 120px 48px; scroll-margin-top: 90px; background: var(--soft-charcoal); border-bottom: 1px solid var(--border-subtle-dark);\">\n    <div style=\"max-width: 960px; margin: 0 auto;\">\n      <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 14px;\">Agenda<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-display); font-size: 44px; font-weight: 800; letter-spacing: var(--tracking-tight); margin: 0 0 40px;\">Three days, three purposes.<\u002Fh2>\n      <div style=\"display: flex; gap: 10px; margin-bottom: 40px;\">\n        <sc-for list=\"{{ agendaTabs }}\" as=\"tab\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ tab.select }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column;\">\n        <sc-for list=\"{{ agendaSessions }}\" as=\"row\" hint-placeholder-count=\"6\">\n          <div style=\"display: grid; grid-template-columns: 140px 1fr; gap: 24px; padding: 18px 0; border-top: 1px solid var(--border-subtle-dark);\">\n            <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-body-s); color: var(--light-grey);\">{{ row.time }}<\u002Fdiv>\n            <div style=\"font-size: var(--text-body); color: var(--white);\">{{ row.session }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"border-top: 1px solid var(--border-subtle-dark);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- EDITIONS — full bleed split toggle -->\n  <div id=\"editions\" style=\"scroll-margin-top: 90px; border-bottom: 1px solid var(--border-subtle-dark);\">\n    <div style=\"padding: 96px 48px 0; max-width: 1280px; margin: 0 auto;\">\n      <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 14px;\">Editions<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-display); font-size: 44px; font-weight: 800; letter-spacing: var(--tracking-tight); margin: 0 0 56px;\">Two regions, same belief.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n      <sc-for list=\"{{ editionCards }}\" as=\"ed\" hint-placeholder-count=\"2\">\n        <button sc-camel-on-click=\"{{ ed.select }}\" style=\"{{ ed.cardStyle }}\">\n          <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 18px;\">{{ ed.name }}<\u002Fdiv>\n          <div style=\"font-family: var(--font-display); font-weight: 800; font-size: 56px; line-height: 1; margin-bottom: 14px;\">{{ ed.city }}<\u002Fdiv>\n          <div style=\"color: var(--light-grey); font-size: var(--text-body-l); margin-bottom: 32px;\">{{ ed.cadence }}<\u002Fdiv>\n          <div style=\"color: var(--light-grey); font-size: var(--text-body-s); line-height: var(--leading-relaxed);\">Leans into {{ ed.focusLabel }} panels.<\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHO ATTENDS — row list, not card grid -->\n  <div id=\"attend\" style=\"padding: 120px 48px; scroll-margin-top: 90px; border-bottom: 1px solid var(--border-subtle-dark);\">\n    <div style=\"max-width: 1280px; margin: 0 auto;\">\n      <div style=\"color: var(--luminous-lavender); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; margin-bottom: 14px;\">Who attends<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-display); font-size: 44px; font-weight: 800; letter-spacing: var(--tracking-tight); margin: 0 0 16px;\">Delegates come from eight industries.<\u002Fh2>\n      <p style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed); max-width: 640px; margin: 0 0 56px;\">Each industry spans both practitioners and decision makers. Featured industries for {{ current.city }} are marked below.<\u002Fp>\n\n      <div style=\"display: flex; flex-direction: column; margin-bottom: 72px;\">\n        <sc-for list=\"{{ industries }}\" as=\"ind\" hint-placeholder-count=\"8\">\n          <div style=\"display: grid; grid-template-columns: 40px 1fr auto; gap: 24px; align-items: center; padding: 22px 0; border-top: 1px solid var(--border-subtle-dark);\">\n            <div style=\"font-family: var(--font-display); font-weight: 700; color: var(--graphite); font-size: var(--text-body-l);\">{{ ind.num }}<\u002Fdiv>\n            <div>\n              <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-body-l); margin-bottom: 4px;\">{{ ind.name }}<\u002Fdiv>\n              <div style=\"color: var(--light-grey); font-size: var(--text-body-s);\">{{ ind.practitioners }}, alongside {{ ind.decisionMakers }}.<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ ind.featured }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"padding: 4px 12px; border-radius: 999px; background: var(--accent-success-surface); color: var(--deep-green); font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; white-space: nowrap;\">Featured<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"border-top: 1px solid var(--border-subtle-dark);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: var(--soft-charcoal); border: 1px solid var(--border-subtle-dark); border-radius: var(--radius-l); padding: 40px; margin-bottom: 64px;\">\n        <div style=\"font-family: var(--font-display); font-weight: 700; font-size: var(--text-heading); margin-bottom: 16px;\">Company delegations<\u002Fdiv>\n        <p style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed); margin: 0 0 14px; max-width: 780px;\">Each company is encouraged to send a pair, one decision maker and one influencer, the person whose judgment the decision maker leans on. In smaller organizations, where one person holds both roles, a single delegate representing both seats is completely valid. This is a preference, not a hard rule.<\u002Fp>\n        <p style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed); margin: 0; max-width: 780px;\">Attendance stays open to any designation within these industries, no seniority gate. What differs by ticket tier is depth of access.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CLOSING CTA -->\n  <div style=\"padding: 140px 48px; max-width: 1120px; margin: 0 auto; text-align: center;\">\n    <h2 style=\"font-family: var(--font-display); font-size: var(--text-display-m); font-weight: 800; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); margin: 0 0 20px;\">Be in the room when it happens.<\u002Fh2>\n    <p style=\"color: var(--light-grey); font-size: var(--text-body-l); line-height: var(--leading-relaxed); margin: 0 0 36px;\">Register your interest.<\u002Fp>\n    <div style=\"display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap;\">\n      <button sc-camel-on-click=\"{{ openRegister }}\" style=\"display: inline-flex; align-items: center; justify-content: center; padding: 15px 30px; border-radius: 999px; background: var(--white); color: var(--black); border: none; font-family: var(--font-display); font-weight: 600; font-size: var(--text-body); cursor: pointer;\">Register your interest<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"border-top: 1px solid var(--border-subtle-dark); padding: 56px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;\">\n    <img src=\"e500addd-71bc-481b-961e-3b05e3cd2744\" alt=\"dot.arc\" style=\"height: 20px;\">\n    <div style=\"display: flex; gap: 32px; flex-wrap: wrap;\">\n      <a href=\"#why\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s);\">Why dot.arc<\u002Fa>\n      <a href=\"#agenda\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s);\">Agenda<\u002Fa>\n      <a href=\"#editions\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s);\">Editions<\u002Fa>\n      <a href=\"mailto:hello@dotarc.events\" style=\"color: var(--light-grey); text-decoration: none; font-size: var(--text-body-s);\">hello@dotarc.events<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"color: var(--light-grey); font-size: var(--text-caption);\">© 2026 dot.arc<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- REGISTER / SPONSOR DIALOG -->\n  <x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Dialog\" open=\"{{ dialogOpen }}\" title=\"{{ dialogTitle }}\" sc-camel-on-close=\"{{ closeDialog }}\" hint-size=\"440px,420px\">\n    <sc-if value=\"{{ dialogConfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"color: var(--light-grey); font-size: var(--text-body); line-height: var(--leading-relaxed); margin: 0 0 24px;\">{{ confirmMessage }}<\u002Fp>\n      <button sc-camel-on-click=\"{{ closeDialog }}\" style=\"display: inline-flex; align-items: center; justify-content: center; padding: 13px 26px; border-radius: 999px; background: var(--white); color: var(--black); border: none; font-family: var(--font-display); font-weight: 600; font-size: var(--text-body); cursor: pointer;\">Done<\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ dialogNotConfirmed }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;\">\n        <div style=\"color: var(--light-grey); font-size: var(--text-body-s); margin-bottom: -4px;\">{{ dialogSubtitle }}<\u002Fdiv>\n        <x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Input\" label=\"Name\" placeholder=\"Your full name\" value=\"{{ formName }}\" sc-camel-on-change=\"{{ onFormNameChange }}\" hint-size=\"100%,68px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Input\" label=\"Work email\" placeholder=\"you@company.com\" type=\"email\" value=\"{{ formEmail }}\" sc-camel-on-change=\"{{ onFormEmailChange }}\" hint-size=\"100%,68px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Input\" label=\"Company\" placeholder=\"Company name\" value=\"{{ formCompany }}\" sc-camel-on-change=\"{{ onFormCompanyChange }}\" hint-size=\"100%,68px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"DotArcDesignSystem_4a32e3.Select\" label=\"Interested in\" value=\"{{ formTier }}\" sc-camel-on-change=\"{{ onFormTierChange }}\" options=\"{{ dialogTierOptions }}\" hint-size=\"100%,68px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ submitDialog }}\" disabled=\"{{ submitDisabled }}\" style=\"{{ submitStyle }}\">Submit<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fx-import>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst INDUSTRIES = [\n  { name: 'Government and public sector', practitioners: 'policy analysts, digital services officers, smart city program leads', decisionMakers: 'digital ministry officials and department heads' },\n  { name: 'Healthcare', practitioners: 'clinical staff and health IT specialists', decisionMakers: 'hospital administrators and chief medical officers' },\n  { name: 'HR and workforce', practitioners: 'HR specialists and people analytics leads', decisionMakers: 'CHROs and heads of talent' },\n  { name: 'Admin and operations', practitioners: 'operations coordinators and process specialists', decisionMakers: 'COOs and heads of operations' },\n  { name: 'Creative industries', practitioners: 'designers and creative technologists', decisionMakers: 'creative directors and agency founders' },\n  { name: 'Technology and AI vendors', practitioners: 'product managers and solutions engineers', decisionMakers: 'VPs of product and CTOs' },\n  { name: 'Academic and research', practitioners: 'researchers and doctoral candidates', decisionMakers: 'professors and institute directors' },\n  { name: 'Media and press', practitioners: 'reporters and correspondents', decisionMakers: 'editors and bureau chiefs' },\n];\n\nconst EVENTS = {\n  gcc: {\n    key: 'gcc', name: 'dot.arc GCC', shortLabel: 'Dubai', city: 'Dubai', region: 'UAE',\n    badgeLabel: 'dot.arc GCC · Each November', dateLabel: 'Each November', cadence: 'Held each November',\n    focusIndustries: ['Government and public sector', 'Healthcare'], focusLabel: 'Government and healthcare',\n  },\n  sea: {\n    key: 'sea', name: 'dot.arc SEA', shortLabel: 'Singapore', city: 'Singapore', region: 'Singapore',\n    badgeLabel: 'dot.arc SEA · Each March', dateLabel: 'Each March', cadence: 'Held each March',\n    focusIndustries: ['HR and workforce', 'Admin and operations', 'Creative industries'], focusLabel: 'HR, admin, and creative industries',\n  },\n};\n\nconst EVENT_STRUCTURE = [\n  { name: 'Main Stage', desc: 'The opening keynote, the Impact Keynote, one spotlight panel per day.' },\n  { name: 'Track Stage', desc: 'Fifteen to twenty minute spotlight sessions, or occasionally a small workshop format, ten slots total across the two days. Which industry fills each slot depends on who registers as a partner.' },\n  { name: 'Reveal Stage', desc: 'Several short reveal slots across both days, a standalone paid package open to any company, sponsor or not.' },\n  { name: 'Exhibition floor', desc: 'Open the entire time beneath all three stages.' },\n  { name: 'Day three', desc: 'Lighter, exhibition plus private meetings, held in the same Main Stage and Track Stage rooms repurposed. No public programming.' },\n];\n\nconst AGENDA_DAYS = [\n  { number: '01', title: 'Day one', sessions: [\n    { time: '9:00–10:00', session: 'Registration, exhibition floor opens' },\n    { time: '10:00–10:45', session: 'Main Stage, opening keynote, the manifesto delivered live' },\n    { time: '10:45–12:15', session: 'Open floor + Track Stage' },\n    { time: '12:15–13:15', session: 'Lunch, dedicated hour' },\n    { time: '13:15–13:45', session: \"Main Stage, Title Partner's own keynote\" },\n    { time: '13:45–14:25', session: 'Main Stage, spotlight panel, AI in Government' },\n    { time: '14:25–15:25', session: 'Open floor + Track Stage' },\n    { time: '15:25–16:05', session: 'Main Stage, spotlight panel, AI in Healthcare' },\n    { time: '16:05–16:25', session: 'Reveal Stage, slot 1' },\n    { time: '16:25–18:00', session: 'Closing networking, wraps by 6pm' },\n  ] },\n  { number: '02', title: 'Day two', sessions: [\n    { time: '9:00–10:00', session: 'Exhibition floor, coffee' },\n    { time: '10:00–10:40', session: 'Main Stage, spotlight panel, AI in HR' },\n    { time: '10:40–12:10', session: 'Open floor + Track Stage' },\n    { time: '12:10–13:10', session: 'Lunch, dedicated hour' },\n    { time: '13:10–13:50', session: 'Main Stage, spotlight panel, AI in Creative Industries' },\n    { time: '13:50–14:10', session: 'Reveal Stage, slot 2' },\n    { time: '14:10–15:10', session: 'Open floor + Track Stage' },\n    { time: '15:10–16:10', session: 'Main Stage, Impact Keynote, hosted by Title Partner' },\n    { time: '16:10–18:00', session: 'Closing networking, wraps by 6pm' },\n  ] },\n  { number: '03', title: 'Day three', sessions: [\n    { time: '9:00–13:00', session: 'Light exhibition + private one-to-one meetings, 30–45 minute blocks' },\n  ] },\n];\n\nconst REGISTRATION_TIERS = [\n  { id: 'exhibition', name: 'Exhibition Only', price: '120 USD', features: ['Floor access both days only'] },\n  { id: 'academic', name: 'Academic', price: '150 USD', features: ['Not for general sale, special request and dot.arc approval required. Full access.'] },\n  { id: 'press', name: 'Verified Press', price: 'Complimentary', features: ['Credentials required. Full access, no meetings.'] },\n  { id: 'media', name: 'Media & Content', price: '150 USD', features: ['For non-verified press, influencers, creators monetizing coverage. Requires tagging dot.arc. No guaranteed meeting.'] },\n  { id: 'day', name: 'Day Pass', price: '350 USD', features: ['Single day only'] },\n  { id: 'standard', name: 'Standard Delegate', price: '650 USD', features: ['Full two days, day three opt-in'] },\n  { id: 'delegation', name: 'Company Delegation', price: '1,100 USD for the pair', features: ['One decision maker, one influencer'] },\n  { id: 'executive', name: 'Executive', price: '2,200 USD', features: ['Two guaranteed day three meetings included'], featured: true },\n];\n\nconst SPONSOR_TIERS = [\n  { id: 'title', name: 'Title', price: '60,000 USD', features: ['One only. Own 30 min keynote day one, hosts Impact Keynote day two, 5 guaranteed meetings'], featured: true },\n  { id: 'platinum', name: 'Platinum', price: '25,000 USD', features: ['Owns a panel track, ideally from within that industry, 3 guaranteed meetings'] },\n  { id: 'gold', name: 'Gold', price: '10,000 USD', features: ['Track branding, 1 guaranteed meeting'] },\n  { id: 'silver', name: 'Silver', price: '5,000 USD', features: ['Standard booth, meetings purchasable only'] },\n  { id: 'presenting', name: 'Presenting', price: '20,000 / 10,000 USD', features: ['Full floor or a zone, naming rights'] },\n  { id: 'transportation', name: 'Transportation', price: '2,500 USD', features: ['Plus supplies the shuttle service'] },\n  { id: 'reveal', name: 'Reveal Stage', price: '30,000 USD', features: ['Standalone paid slot, any company, not tied to a tier'] },\n];\n\nconst IN_KIND_TIERS = [\n  { id: 'venue', name: 'Venue Partner' },\n  { id: 'media', name: 'Media Partner' },\n  { id: 'community', name: 'Community Partner' },\n];\n\nclass Component extends DCLogic {\n  state = {\n    eventKey: 'gcc',\n    dialogOpen: false,\n    dialogMode: 'register',\n    dialogConfirmed: false,\n    formName: '',\n    formEmail: '',\n    formCompany: '',\n    formTier: '',\n    scrolled: false,\n    agendaDay: 0,\n  };\n\n  componentDidMount() {\n    this.onScroll = () => {\n      const scrolled = window.scrollY > 240;\n      if (scrolled !== this.state.scrolled) this.setState({ scrolled });\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n  }\n\n  setEvent(key) {\n    if (key === this.state.eventKey) return;\n    this.setState({ eventKey: key });\n  }\n\n  openDialog(mode, defaultTier) {\n    this.setState({ dialogOpen: true, dialogMode: mode, dialogConfirmed: false, formTier: defaultTier || '' });\n  }\n\n  renderVals() {\n    const current = EVENTS[this.state.eventKey];\n    const mode = this.state.dialogMode;\n\n    const navBarStyle = {\n      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 500,\n      display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n      padding: '18px 48px', background: 'rgba(2,2,2,0.85)',\n      backdropFilter: 'blur(12px) saturate(160%)',\n      borderBottom: '1px solid var(--border-subtle-dark)',\n      transform: this.state.scrolled ? 'translateY(0)' : 'translateY(-100%)',\n      opacity: this.state.scrolled ? 1 : 0,\n      transition: 'transform 200ms ease-out, opacity 200ms ease-out',\n      pointerEvents: this.state.scrolled ? 'auto' : 'none',\n    };\n\n    const eventList = ['gcc', 'sea'].map((key) => {\n      const ev = EVENTS[key];\n      const active = key === this.state.eventKey;\n      return {\n        shortLabel: ev.shortLabel,\n        select: () => this.setEvent(key),\n        pillStyle: {\n          padding: '7px 18px', borderRadius: '999px', border: 'none',\n          background: active ? 'var(--white)' : 'transparent',\n          color: active ? 'var(--black)' : 'var(--light-grey)',\n          fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 'var(--text-body-s)', cursor: 'pointer',\n        },\n      };\n    });\n\n    const agendaTabs = AGENDA_DAYS.map((d, i) => {\n      const active = i === this.state.agendaDay;\n      return {\n        label: d.title,\n        select: () => this.setState({ agendaDay: i }),\n        style: {\n          padding: '11px 22px', borderRadius: '999px', border: active ? 'none' : '1px solid var(--border-subtle-dark)',\n          background: active ? 'var(--white)' : 'transparent',\n          color: active ? 'var(--black)' : 'var(--light-grey)',\n          fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 'var(--text-body-s)', cursor: 'pointer',\n        },\n      };\n    });\n    const agendaSessions = AGENDA_DAYS[this.state.agendaDay].sessions;\n    const eventStructure = EVENT_STRUCTURE.map((s, i) => ({ ...s, num: String(i + 1).padStart(2, '0') }));\n\n    const industries = INDUSTRIES.map((ind, i) => ({\n      ...ind,\n      num: String(i + 1).padStart(2, '0'),\n      featured: current.focusIndustries.includes(ind.name),\n    }));\n\n    const editionCards = ['gcc', 'sea'].map((key) => {\n      const ev = EVENTS[key];\n      const active = key === this.state.eventKey;\n      return {\n        ...ev,\n        select: () => this.setEvent(key),\n        cardStyle: {\n          textAlign: 'left', cursor: 'pointer', fontFamily: 'var(--font-body)',\n          background: active ? 'var(--graphite)' : 'var(--black)',\n          border: 'none',\n          borderRight: key === 'gcc' ? '1px solid var(--border-subtle-dark)' : 'none',\n          padding: '64px 56px', color: 'var(--white)',\n        },\n      };\n    });\n\n    const tierCardStyle = (featured) => ({\n      display: 'flex', flexDirection: 'column',\n      background: featured ? 'var(--graphite)' : 'var(--black)',\n      border: featured ? '1px solid var(--luminous-lavender)' : '1px solid var(--border-subtle-dark)',\n      borderRadius: 'var(--radius-l)', padding: '28px',\n      boxShadow: featured ? 'var(--shadow-glow-violet)' : 'none',\n    });\n    const registrationTiers = REGISTRATION_TIERS.map((t) => ({ ...t, select: () => this.openDialog('register', t.id), cardStyle: tierCardStyle(t.featured) }));\n    const sponsorTiers = SPONSOR_TIERS.map((t) => ({ ...t, select: () => this.openDialog('sponsor', t.id), cardStyle: tierCardStyle(t.featured) }));\n    const inKindTiers = IN_KIND_TIERS.map((t) => ({ ...t, select: () => this.openDialog('sponsor', t.id) }));\n\n    const dialogTierOptions = mode === 'register'\n      ? REGISTRATION_TIERS.map((t) => ({ value: t.id, label: t.name }))\n      : [...SPONSOR_TIERS, ...IN_KIND_TIERS].map((t) => ({ value: t.id, label: t.name }));\n\n    const allTierNames = {};\n    REGISTRATION_TIERS.forEach((t) => { allTierNames[t.id] = t.name; });\n    SPONSOR_TIERS.forEach((t) => { allTierNames[t.id] = t.name; });\n    IN_KIND_TIERS.forEach((t) => { allTierNames[t.id] = t.name; });\n\n    const submitDisabled = !this.state.formName || !this.state.formEmail;\n    const chosenTierName = allTierNames[this.state.formTier] || (mode === 'register' ? 'Standard delegate' : 'Title');\n\n    return {\n      current,\n      eventList,\n      navBarStyle,\n      eventStructure,\n      agendaTabs,\n      agendaSessions,\n      editionCards,\n      industries,\n      registrationTiers,\n      sponsorTiers,\n      inKindTiers,\n      openRegister: () => this.openDialog('register', 'standard'),\n      openSponsor: () => this.openDialog('sponsor', 'title'),\n      dialogOpen: this.state.dialogOpen,\n      dialogConfirmed: this.state.dialogConfirmed,\n      dialogNotConfirmed: !this.state.dialogConfirmed,\n      dialogTitle: mode === 'register' ? 'Register your interest' : 'Sponsor dot.arc',\n      dialogSubtitle: `For dot.arc ${current.city}, ${current.dateLabel.toLowerCase()}.`,\n      dialogTierOptions,\n      formName: this.state.formName,\n      formEmail: this.state.formEmail,\n      formCompany: this.state.formCompany,\n      formTier: this.state.formTier,\n      onFormNameChange: (e) => this.setState({ formName: e.target.value }),\n      onFormEmailChange: (e) => this.setState({ formEmail: e.target.value }),\n      onFormCompanyChange: (e) => this.setState({ formCompany: e.target.value }),\n      onFormTierChange: (e) => this.setState({ formTier: e.target.value }),\n      closeDialog: () => this.setState({ dialogOpen: false }),\n      submitDialog: () => { if (!submitDisabled) this.setState({ dialogConfirmed: true }); },\n      submitDisabled,\n      submitStyle: {\n        width: '100%', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',\n        padding: '15px 26px', borderRadius: '999px',\n        background: submitDisabled ? 'var(--graphite)' : 'var(--deep-violet)',\n        color: submitDisabled ? 'var(--light-grey)' : 'var(--white)',\n        border: 'none', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 'var(--text-body)',\n        cursor: submitDisabled ? 'not-allowed' : 'pointer',\n      },\n      confirmMessage: mode === 'register'\n        ? `Thanks, ${this.state.formName || 'there'}. We'll follow up about ${chosenTierName.toLowerCase()} access for dot.arc ${current.city}.`\n        : `Thanks, ${this.state.formName || 'there'}. We'll follow up about ${chosenTierName} sponsorship for dot.arc ${current.city}.`,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
